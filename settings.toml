# Tunable settings (non-secret). Secrets (logins, API key) live in .env.
# Edit values here and re-run; no code changes needed.

# How many hours ahead to pull Betfair odds for upcoming games.
window_hours = 100

# Only aggregate the top N users from the leaderboard into the crowd
# distribution (sharper signal than the whole field). Set to 0 to include
# everyone. Fewer users also means fewer requests to topcorner.org.
leaderboard_top_n = 0

# Max scorelines shown in the crowd distribution (the rest roll into "+N others").
crowd_score_limit = 19

# Minimum seconds between topcorner.org requests (politeness throttle).
topcorner_throttle = 0.5

# Your topcorner username. Adds a section listing the predicted scores of every
# player ranked above you on the leaderboard. Blank = omit that section.
my_username = "AjaxTreesdown"

# Size of the secondary "Top N" crowd distribution shown next to the full field.
top_dist_n = 20

# Output folders for the per-game reports.
md_dir = "reports/md"
json_dir = "reports/json"
